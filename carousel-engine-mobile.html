<style>
  /* ==========================================================================
     GLOBAL BASE THEME (CORE STRUCTURAL DEFAULT FALLBACKS ONLY)
     ========================================================================== */
  :root {
    --carousel-bg: #031416;
    --panel-shadow: 0 4px 15px rgba(0,0,0,0.6);
    --text-primary: #f4ecd8;
    --text-secondary: #cbd2c7;
    --text-muted: #8a9286;
    --accent-gold: #c39a4f;
    --accent-hover: #e5a93b;
    --border-color: #1a4246;
    --divider-style: 1px solid #1a4246;
    --card-radius: 4px;
  }

  /* ==========================================================================
     CORE MASTER SYSTEMS STRUCTURAL LAYOUT (MOBILE DESIGNATED STACK)
     ========================================================================== */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 6px;
    background-color: transparent;
    box-sizing: border-box;
  }

  .carousel-wrapper {
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: auto;
    box-sizing: border-box;
  }

  /* Header Tracker Navigation */
  .mobile-navigation-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 4px 8px;
    box-sizing: border-box;
    margin-bottom: 8px;
  }

  .burger-menu-icon {
    font-size: 1.1rem;
    color: var(--accent-gold);
    cursor: pointer;
  }

  .book-counter {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text-primary);
  }

  /* Uncluttered Core Console Display */
  .carousel-content {
    background: var(--carousel-bg);
    border-radius: var(--card-radius);
    box-shadow: var(--panel-shadow);
    padding: 12px;
    width: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Main Front-Facing Book Cover Container */
  .mobile-cover-viewport {
    width: 100%;
    max-width: 240px; /* Perfectly balances vertical height limits on devices */
    aspect-ratio: 2 / 3;
    margin: 0 auto 12px auto;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .mobile-main-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 4px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
  }

  /* Diamond Navigation Indicator Row */
  .mobile-dots-indicator-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    width: 100%;
    flex-wrap: wrap;
  }

  .mobile-dot {
    width: 6px;
    height: 6px;
    background-color: rgba(255, 255, 255, 0.2);
    border: 1px solid var(--accent-gold);
    transform: rotate(45deg);
    transition: background-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }

  .mobile-dot.active {
    background-color: var(--accent-hover) !important;
    box-shadow: 0 0 8px var(--accent-hover);
  }

  /* Typography Details Block */
  .main-display-viewport-frame {
    width: 100%;
    box-sizing: border-box;
  }

  .description-text {
    display: none;
    width: 100%;
    box-sizing: border-box;
  }

  .description-text.active {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .details-column {
    width: 100%;
    display: flex;
    flex-direction: column;
  }

  .details-column h2 {
    margin: 0 0 2px 0;
    color: var(--accent-hover);
    font-size: 1.3rem;
    line-height: 1.2;
  }

  .author-name {
    color: var(--text-secondary);
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #49dec9; /* Dynamic subheader focus */
    margin-bottom: 4px;
    margin-top: 8px;
  }

  .details-column p {
    color: var(--text-secondary);
    line-height: 1.4;
    font-size: 0.8rem;
    margin-top: 0;
    margin-bottom: 8px;
    white-space: normal;
    word-break: break-word;
  }

  /* ==========================================================================
     PURCHASE ACTION STACK LAYERPANEL (FULL-BLEED BUTTONS)
     ========================================================================== */
  .purchase-column {
    border-top: var(--divider-style);
    padding-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    box-sizing: border-box;
  }

  .purchase-category {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
  }

  .category-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent-gold);
    margin-bottom: 2px;
  }

  .store-grid-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
  }

  .store-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    color: #12161a !important;
    text-decoration: none;
    box-sizing: border-box;
    font-weight: 600;
    font-size: 0.8rem;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .brand-left-zone {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brand-logo-img {
    width: 14px;
    height: 14px;
    object-fit: contain;
  }

  .brand-main-title {
    color: #202124;
  }

  .icon-arrow {
    font-size: 0.75rem;
    color: #888888;
  }

  .disclaimer-banner {
    font-size: 0.65rem;
    color: var(--text-muted);
    text-align: center;
    padding: 4px;
    width: 100%;
    box-sizing: border-box;
    margin-top: 4px;
  }
</style>

<div class="carousel-wrapper">
  <div class="mobile-navigation-bar">
    <div class="burger-menu-icon">☰</div>
    <div class="book-counter" id="mobile-counter-display">BOOK 1 OF 24</div>
    <div class="mobile-dot active" style="margin:0; border-color:transparent;"></div>
  </div>
  
  <div class="carousel-content">
    <div class="mobile-cover-viewport" id="cover-viewport-node">
      </div>

    <div class="mobile-dots-indicator-row" id="dynamic-dots-track"></div>

    <div class="main-display-viewport-frame">
      <div class="text-panel" id="main-text-viewport"></div>
    </div>
  </div>
</div>

<script>
  let currentSlide = 0;
  let txtViewport, coverViewport, dotsTrack, counterDisplay;

  function initializeCarouselDOM() {
    txtViewport = document.getElementById('main-text-viewport');
    coverViewport = document.getElementById('cover-viewport-node');
    dotsTrack = document.getElementById('dynamic-dots-track');
    counterDisplay = document.getElementById('mobile-counter-display');

    txtViewport.innerHTML = '';
    coverViewport.innerHTML = '';
    dotsTrack.innerHTML = '';

    if (!window.bookDatabase || window.bookDatabase.length === 0) {
      return;
    }

    // Build the permanent structural single-cover frame asset
    const mainImgElement = document.createElement('img');
    mainImgElement.id = 'mobile-core-cover';
    mainImgElement.className = 'mobile-main-img';
    mainImgElement.src = window.bookDatabase[0].cover;
    mainImgElement.alt = "Book Cover Frame";
    
    // Wire up standard touch swipe gestures for mobile access optimization
    let touchStartX = 0;
    let touchEndX = 0;
    mainImgElement.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
    mainImgElement.addEventListener('touchend', e => { 
      touchEndX = e.changedTouches[0].screenX;
      handleSwipeGesture();
    }, false);

    function handleSwipeGesture() {
      if (touchEndX < touchStartX - 50) changeSlide(1);  // Swiped Left
      if (touchEndX > touchStartX + 50) changeSlide(-1); // Swiped Right
    }

    coverViewport.appendChild(mainImgElement);

    window.bookDatabase.forEach((book, idx) => {
      // 1. Append textual information cards
      const textBlock = document.createElement('div');
      textBlock.className = `description-text ${idx === 0 ? 'active' : ''}`;
      textBlock.innerHTML = `
        <div class="details-column">
          <h2>${book.title}</h2>
          <div class="author-name">${book.author}</div>
          <h3 class="section-title">Summary</h3>
          <p>${book.summary}</p>
          <h3 class="section-title">Why it matters</h3>
          <p>${book.whyMatters}</p>
        </div>
        <div class="purchase-column">
          <div class="purchase-category">
            <span class="category-label">Physical</span>
            <div class="store-grid-row">
              <a href="${book.links.amazon || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Amazon_icon.svg" alt="Amazon">
                  <span class="brand-main-title">Amazon</span>
                </div><span class="icon-arrow">↗</span>
              </a>
              <a href="${book.links.bookshop || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://cdn.prod.website-files.com/6267f35934aa8b1795cf1a9f/63d1aa1cfa703d3dbec99f92_Indie-BoundB-p-500.png" alt="Bookshop">
                  <span class="brand-main-title">Bookshop</span>
                </div><span class="icon-arrow">↗</span>
              </a>
            </div>
          </div>
          <div class="purchase-category">
            <span class="category-label">Audio</span>
            <div class="store-grid-row">
              <a href="${book.links.audible || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://www.audible.com/favicon.ico" alt="Audible">
                  <span class="brand-main-title">Audible</span>
                </div><span class="icon-arrow">↗</span>
              </a>
              <a href="${book.links.libro || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://libro.fm/favicon.ico" onerror="this.src='https://cdn-icons-png.flaticon.com/128/3400/3400493.png'" alt="Libro.fm">
                  <span class="brand-main-title">Libro.fm</span>
                </div><span class="icon-arrow">↗</span>
              </a>
            </div>
          </div>
          <div class="purchase-category">
            <span class="category-label">Ebook</span>
            <div class="store-grid-row">
              <a href="${book.links.kindle || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Amazon_icon.svg" alt="Kindle">
                  <span class="brand-main-title">Kindle</span>
                </div><span class="icon-arrow">↗</span>
              </a>
              <a href="${book.links.kobo || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://www.kobo.com/favicon.ico" onerror="this.src='https://cdn-icons-png.flaticon.com/128/2942/2942928.png'" alt="Kobo">
                  <span class="brand-main-title">Kobo</span>
                </div><span class="icon-arrow">↗</span>
              </a>
            </div>
          </div>
          <div class="disclaimer-banner">Links support the channel!!</div>
        </div>
      `;
      txtViewport.appendChild(textBlock);

      // 2. Generate matching Diamond Node Array trackers
      const dotNode = document.createElement('div');
      dotNode.className = `mobile-dot ${idx === 0 ? 'active' : ''}`;
      dotNode.onclick = () => jumpToSlide(idx);
      dotsTrack.appendChild(dotNode);
    });
    
    updateInterfaceElements();
  }

  function updateInterfaceElements() {
    const texts = document.querySelectorAll('.description-text');
    const dots = document.querySelectorAll('.mobile-dot');
    const targetCoverImg = document.getElementById('mobile-core-cover');

    // Sync Active Text & Diamond Node states
    texts.forEach((txt, idx) => txt.classList.toggle('active', idx === currentSlide));
    dots.forEach((dt, idx) => dt.classList.toggle('active', idx === currentSlide));

    // Dynamic Engine Swapping for Core Frame Cover Target
    if (targetCoverImg && window.bookDatabase[currentSlide]) {
      targetCoverImg.src = window.bookDatabase[currentSlide].cover;
    }

    // Update Counter Banner Track 
    if (counterDisplay && window.bookDatabase) {
      counterDisplay.textContent = `BOOK ${currentSlide + 1} OF ${window.bookDatabase.length}`;
    }
  }

  function changeSlide(direction) {
    if (!window.bookDatabase || window.bookDatabase.length === 0) return;
    currentSlide = (currentSlide + direction + window.bookDatabase.length) % window.bookDatabase.length;
    updateInterfaceElements();
  }

  function jumpToSlide(slideIndex) {
    currentSlide = slideIndex;
    updateInterfaceElements();
  }

  // Self-boot assembly core layer logic
  initializeCarouselDOM();
</script>
