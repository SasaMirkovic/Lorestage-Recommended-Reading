<script src="https://cdn.jsdelivr.net/gh/SasaMirkovic/Lorestage-Recommended-Reading@main/books-database.js"></script>

<script src="https://cdn.jsdelivr.net/gh/SasaMirkovic/Lorestage-Recommended-Reading@main/carousel-content.js"></script>

<script>
  const ACTIVE_GAME = "bioshock"; // Simply switch to "stalker" on your other page!
</script>

<div id="carousel-target"></div>

<script>
  const selectedCollection = window.gameLibraries ? window.gameLibraries[ACTIVE_GAME] : null;

  if (selectedCollection) {
    window.bookDatabase = selectedCollection.map(config => {
      const masterData = MASTER_BOOK_DIRECTORY[config.id];
      if (!masterData) {
        console.error(`Missing metadata inside books-database.js for ID: ${config.id}`);
        return null;
      }
      return { ...masterData, whyMatters: config.whyMatters };
    }).filter(book => book !== null);
  }

  // NEW FIX: Dynamic injection of your external CSS themes sheet
  const themeStylesheet = document.createElement('link');
  themeStylesheet.rel = 'stylesheet';
  themeStylesheet.href = 'https://cdn.jsdelivr.net/gh/SasaMirkovic/Lorestage-Recommended-Reading@main/carousel-themes.css';
  document.head.appendChild(themeStylesheet);

  // Fetch and inject the core framework engine layout
  fetch('https://cdn.jsdelivr.net/gh/SasaMirkovic/Lorestage-Recommended-Reading@main/carousel-engine.html')
    .then(response => response.text())
    .then(htmlString => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlString, 'text/html');
      
      const style = doc.querySelector('style');
      if (style) document.head.appendChild(style);
      
      const wrapper = doc.querySelector('.carousel-wrapper');
      const targetElement = document.getElementById('carousel-target');
      
      if (wrapper && targetElement) {
        // 1. Apply the game key as a class to the outer target div
        targetElement.classList.add(ACTIVE_GAME);
        
        // 2. Apply the game key as a class to the internal carousel framework
        wrapper.classList.add(ACTIVE_GAME);
        
        targetElement.appendChild(wrapper);
      }
      
      const script = doc.querySelector('script');
      if (script) {
        const newScript = document.createElement('script');
        newScript.textContent = script.textContent;
        document.body.appendChild(newScript);
      }
    })
    .catch(err => console.error('Error loading carousel engine:', err));
</script>
