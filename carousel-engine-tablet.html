<style>
  /* ==========================================================================
     GLOBAL BASE THEME (CORE STRUCTURAL DEFAULT FALLBACKS ONLY)
     ========================================================================== */
  :root {
    --carousel-bg: #031416;
    --panel-shadow: 0 4px 15px rgba(0,0,0,0.6);
    --text-primary: #f4ecd8;
    --text-secondary: #cbd2c7;
    --text-muted: #8a9286;
    --accent-gold: #c39a4f;
    --accent-hover: #e5a93b;
    --border-color: #1a4246;
    --divider-style: 1px solid #1a4246;
    --card-radius: 4px;
    --thumb-bg: #12161a;
    --thumb-border: 1px solid #232930;
    --thumb-active-border: #e5a93b;
  }

  /* ==========================================================================
     CORE MASTER SYSTEMS STRUCTURAL LAYOUT (TABLET TWO-COLUMN DESIGN)
     ========================================================================== */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 10px;
    background-color: transparent;
    box-sizing: border-box;
  }

  .carousel-wrapper {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: auto;
    gap: 8px;
    box-sizing: border-box;
  }

  /* Top Control Center Indicator Block */
  .top-indicator-panel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 4px 8px;
    box-sizing: border-box;
  }

  .burger-menu-icon {
    font-size: 1.2rem;
    color: var(--accent-gold);
    cursor: pointer;
  }

  .book-counter {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-primary);
  }

  /* Main Dynamic Two-Column Layout Framework Grid */
  .carousel-content {
    background: var(--carousel-bg);
    border-radius: var(--card-radius);
    box-shadow: var(--panel-shadow);
    padding: 16px;
    width: 100%;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 42% 1fr; /* Left visual panel / Right metadata content */
    gap: 20px;
  }

  /* ==========================================================================
     LEFT SIDE: STATIC HERO CONTAINER + LOWER SLIDEOVER CARDS
     ========================================================================== */
  .visual-media-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .tablet-cover-frame {
    width: 100%;
    aspect-ratio: 2 / 3;
    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
  }

  .tablet-main-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 4px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.5);
  }

  /* Lower Integrated Horizontal Slider Track Container Layout Blueprint */
  .tablet-slider-navigation-row {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 4px;
  }

  .nav-arrow {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--accent-gold);
    padding: 0 4px;
    transition: color 0.2s;
    user-select: none;
  }

  .nav-arrow:hover {
    color: var(--accent-hover);
  }

  .thumbnail-slider-window {
    flex-grow: 1;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    box-sizing: border-box;
    scrollbar-width: none; /* Hide scrollbar for seamless track design */
    padding: 4px 0;
  }
  
  .thumbnail-slider-window::-webkit-scrollbar {
    display: none;
  }

  .thumbnail-navigation-track {
    display: inline-flex;
    gap: 6px;
  }

  .thumb-card {
    display: inline-block;
    width: 36px;
    height: 52px;
    background: var(--thumb-bg);
    border: var(--thumb-border);
    border-radius: 4px;
    padding: 2px;
    cursor: pointer;
    box-sizing: border-box;
    transition: border-color 0.15s;
  }

  .thumb-card.active {
    border-color: var(--thumb-active-border) !important;
    background: rgba(255, 255, 255, 0.1);
  }

  .thumb-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 2px;
  }

  /* ==========================================================================
     RIGHT SIDE: TEXT DISPLAY CONTAINER & ACTION MATRIX
     ========================================================================== */
  .main-display-viewport-frame {
    width: 100%;
    min-width: 0; /* Protects grid layouts from breaking on flex-child string overflows */
  }

  .description-text {
    display: none;
    width: 100%;
    box-sizing: border-box;
  }

  .description-text.active {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .details-column {
    width: 100%;
    display: flex;
    flex-direction: column;
    max-height: 280px; /* Locked down scroll container window */
    overflow-y: auto;
    padding-right: 6px;
    box-sizing: border-box;
  }

  .details-column::-webkit-scrollbar {
    width: 4px;
  }
  .details-column::-webkit-scrollbar-track {
    background: transparent;
  }
  .details-column::-webkit-scrollbar-thumb {
    background: var(--accent-gold);
    border-radius: 4px;
  }

  .details-column h2 {
    margin: 0 0 2px 0;
    color: var(--accent-hover);
    font-size: 1.4rem;
    line-height: 1.2;
  }

  .author-name {
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #49dec9;
    margin-bottom: 4px;
    margin-top: 10px;
  }

  .details-column p {
    color: var(--text-secondary);
    line-height: 1.42;
    font-size: 0.82rem;
    margin-top: 0;
    margin-bottom: 8px;
    white-space: normal;
    word-break: break-word;
  }

  /* Integrated Purchase Area Blocks spanning full layout dimensions safely */
  .purchase-column {
    border-top: var(--divider-style);
    padding-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .purchase-category {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
  }

  .category-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent-gold);
  }

  .store-grid-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* Two parallel horizontal button pairs across tablet viewports */
    gap: 8px;
    width: 100%;
  }

  .store-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    color: #12161a !important;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.8rem;
    box-sizing: border-box;
  }

  .brand-left-zone {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .brand-logo-img {
    width: 14px;
    height: 14px;
    object-fit: contain;
  }

  .icon-arrow {
    font-size: 0.7rem;
    color: #888888;
  }

  .disclaimer-banner {
    font-size: 0.62rem;
    color: var(--text-muted);
    text-align: center;
    width: 100%;
    margin-top: 2px;
  }
</style>

<div class="carousel-wrapper">
  <div class="top-indicator-panel">
    <div class="burger-menu-icon">☰</div>
    <div class="book-counter" id="tablet-counter-display">Loading...</div>
    <div style="width:20px;"></div> </div>

  <div class="carousel-content">
    <div class="visual-media-panel">
      <div class="tablet-cover-frame" id="tablet-cover-viewport">
        </div>
      
      <div class="tablet-slider-navigation-row">
        <button class="nav-arrow" onclick="changeSlide(-1)">❮</button>
        <div class="thumbnail-slider-window" id="slider-window">
          <div class="thumbnail-navigation-track" id="thumb-track"></div>
        </div>
        <button class="nav-arrow" onclick="changeSlide(1)">❯</button>
      </div>
    </div>

    <div class="main-display-viewport-frame">
      <div class="text-panel" id="main-text-viewport"></div>
    </div>
  </div>
</div>

<script>
  let currentSlide = 0;
  let txtViewport, coverViewport, thumbTrack, sliderWindow, counterDisplay;

  function initializeCarouselDOM() {
    txtViewport = document.getElementById('main-text-viewport');
    coverViewport = document.getElementById('tablet-cover-viewport');
    thumbTrack = document.getElementById('thumb-track');
    sliderWindow = document.getElementById('slider-window');
    counterDisplay = document.getElementById('tablet-counter-display');

    txtViewport.innerHTML = '';
    coverViewport.innerHTML = '';
    thumbTrack.innerHTML = '';

    if (!window.bookDatabase || window.bookDatabase.length === 0) {
      if(counterDisplay) counterDisplay.innerText = "NO DATA CONFIGURED.";
      return;
    }

    // Build standalone static image node item framework element
    const mainImgElement = document.createElement('img');
    mainImgElement.id = 'tablet-core-cover';
    mainImgElement.className = 'tablet-main-img';
    mainImgElement.src = window.bookDatabase[0].cover;
    mainImgElement.alt = "Core Cover Viewport Frame";
    coverViewport.appendChild(mainImgElement);

    window.bookDatabase.forEach((book, idx) => {
      // 1. Structural layout mapping for textual descriptive cards
      const textBlock = document.createElement('div');
      textBlock.className = `description-text ${idx === 0 ? 'active' : ''}`;
      textBlock.innerHTML = `
        <div class="details-column">
          <h2>${book.title}</h2>
          <div class="author-name">${book.author}</div>
          <h3 class="section-title">Summary</h3>
          <p>${book.summary}</p>
          <h3 class="section-title">Why it matters</h3>
          <p>${book.whyMatters}</p>
        </div>
        <div class="purchase-column">
          <div class="purchase-category">
            <span class="category-label">Physical</span>
            <div class="store-grid-row">
              <a href="${book.links.amazon || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Amazon_icon.svg" alt="Amazon">
                  <span class="brand-main-title">Amazon</span>
                </div><span class="icon-arrow">↗</span>
              </a>
              <a href="${book.links.bookshop || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://cdn.prod.website-files.com/6267f35934aa8b1795cf1a9f/63d1aa1cfa703d3dbec99f92_Indie-BoundB-p-500.png" alt="Bookshop">
                  <span class="brand-main-title">Bookshop</span>
                </div><span class="icon-arrow">↗</span>
              </a>
            </div>
          </div>
          <div class="purchase-category">
            <span class="category-label">Audio</span>
            <div class="store-grid-row">
              <a href="${book.links.audible || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://www.audible.com/favicon.ico" alt="Audible">
                  <span class="brand-main-title">Audible</span>
                </div><span class="icon-arrow">↗</span>
              </a>
              <a href="${book.links.libro || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://libro.fm/favicon.ico" onerror="this.src='https://cdn-icons-png.flaticon.com/128/3400/3400493.png'" alt="Libro.fm">
                  <span class="brand-main-title">Libro.fm</span>
                </div><span class="icon-arrow">↗</span>
              </a>
            </div>
          </div>
          <div class="purchase-category">
            <span class="category-label">Ebook</span>
            <div class="store-grid-row">
              <a href="${book.links.kindle || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Amazon_icon.svg" alt="Kindle">
                  <span class="brand-main-title">Kindle</span>
                </div><span class="icon-arrow">↗</span>
              </a>
              <a href="${book.links.kobo || '#'}" target="_blank" class="store-link">
                <div class="brand-left-zone">
                  <img class="brand-logo-img" src="https://www.kobo.com/favicon.ico" onerror="this.src='https://cdn-icons-png.flaticon.com/128/2942/2942928.png'" alt="Kobo">
                  <span class="brand-main-title">Kobo</span>
                </div><span class="icon-arrow">↗</span>
              </a>
            </div>
          </div>
          <div class="disclaimer-banner">Links support the channel!</div>
        </div>
      `;
      txtViewport.appendChild(textBlock);

      // 2. Build the horizontal bottom slide-track card options
      const thumb = document.createElement('div');
      thumb.className = `thumb-card ${idx === 0 ? 'active' : ''}`;
      thumb.onclick = () => jumpToSlide(idx);
      thumb.innerHTML = `
        <img class="thumb-img" src="${book.cover}" alt="Thumb ${idx + 1}">
      `;
      thumbTrack.appendChild(thumb);
    });

    updateInterfaceElements();
  }

  function adjustThumbnailScrollPosition() {
    const thumbs = document.querySelectorAll('.thumb-card');
    if (thumbs.length === 0 || !sliderWindow) return;
    
    const currentThumb = thumbs[currentSlide];
    const windowWidth = sliderWindow.offsetWidth;
    
    // Smoothly scroll horizontal sliding panel row to keep active cover targeted center frame
    const targetOffset = currentThumb.offsetLeft - (windowWidth / 2) + (currentThumb.offsetWidth / 2);
    sliderWindow.scrollTo({ left: targetOffset, behavior: 'smooth' });
  }

  function updateInterfaceElements() {
    const texts = document.querySelectorAll('.description-text');
    const thumbs = document.querySelectorAll('.thumb-card');
    const targetCoverImg = document.getElementById('tablet-core-cover');

    texts.forEach((txt, idx) => txt.classList.toggle('active', idx === currentSlide));
    thumbs.forEach((tmb, idx) => tmb.classList.toggle('active', idx === currentSlide));

    // Dynamic Image File Swapping Matrix Routing
    if (targetCoverImg && window.bookDatabase[currentSlide]) {
      targetCoverImg.src = window.bookDatabase[currentSlide].cover;
    }

    // Update Master Heading Tracker Frame Elements
    if (counterDisplay && window.bookDatabase) {
      counterDisplay.textContent = `BOOK ${currentSlide + 1} OF ${window.bookDatabase.length}`;
    }

    adjustThumbnailScrollPosition();
  }

  function changeSlide(direction) {
    if (!window.bookDatabase || window.bookDatabase.length === 0) return;
    currentSlide = (currentSlide + direction + window.bookDatabase.length) % window.bookDatabase.length;
    updateInterfaceElements();
  }

  function jumpToSlide(slideIndex) {
    currentSlide = slideIndex;
    updateInterfaceElements();
  }

  // Initialization Boot Process Layer Trigger
  initializeCarouselDOM();
</script>
